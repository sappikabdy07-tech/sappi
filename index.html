<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharma Premium Portal</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.box{
width:100%;
max-width:600px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
text-align:center;
}

h1,h2,p{color:white}

input,textarea,select{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4f81;
color:white;
cursor:pointer;
margin:5px;
}

.hidden{display:none}

.option{
background:white;
margin:8px;
padding:10px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.option:hover{transform:scale(1.03)}

.card-detail{
color:white;
text-align:left;
padding:10px;
}

.section{
background:rgba(255,255,255,0.15);
padding:10px;
margin:8px 0;
border-radius:12px;
}

#result{color:white;margin-top:10px}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="login">
<h1>🔐 Login</h1>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- WELCOME -->
<div id="welcome" class="hidden">
<h1>🌸 Welcome Sharma 🌸</h1>
<p>Your happiness matters here 💖</p>
<button onclick="goMood()">Continue</button>
</div>

<!-- MOOD -->
<div id="mood" class="hidden">
<h1>😊 How Are You?</h1>

<div class="option" onclick="goReason()">Happy</div>
<div class="option" onclick="goReason()">Normal</div>
<div class="option" onclick="goReason()">Need Care</div>

<button onclick="back('welcome','mood')">⬅ Back</button>
</div>

<!-- REASON -->
<div id="reason" class="hidden">
<h1>💌 Choose Action</h1>

<div class="option" onclick="goBooking()">🎟️ Make Booking</div>
<div class="option" onclick="goScratch()">🎁 Scratch Card</div>

<button onclick="back('mood','reason')">⬅ Back</button>
</div>

<!-- BOOKING -->
<div id="booking" class="hidden">
<h1>🎟️ Select Service</h1>

<div class="option" onclick="selectService('Talk')">🗣️ Talk</div>
<div class="option" onclick="selectService('Time')">⏰ Time</div>
<div class="option" onclick="selectService('Coffee')">☕ Coffee</div>
<div class="option" onclick="selectService('Movie')">🎬 Movie</div>

<button onclick="showBenefits()">Continue</button>
<button onclick="back('reason','booking')">⬅ Back</button>
</div>

<!-- BENEFITS -->
<div id="benefits" class="hidden"></div>

<!-- APPOINTMENT -->
<div id="appointment" class="hidden">
<h1>📅 Select Date & Time</h1>

<input type="date" id="date">
<input type="time" id="time">
<textarea id="note" placeholder="Write note"></textarea>

<button onclick="goPayment()">Continue to Payment</button>
<button onclick="back('benefits','appointment')">⬅ Back</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="hidden">
<h1>💳 Payment Page</h1>

<p style="color:white">Select Payment Method (Demo)</p>

<select id="payMethod">
<option>UPI</option>
<option>Card</option>
<option>Net Banking</option>
</select>

<button onclick="payNow()">Pay Now</button>
<button onclick="back('appointment','payment')">⬅ Back</button>
</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>

let service="";

// LOGIN
function login(){
let u=user.value;
let p=pass.value;

if((u=="sharma" && p=="1234") || (u=="vikas" && p=="1234")){
login.style.display="none";
welcome.style.display="block";
}else alert("Wrong Login");
}

// FLOW
function goMood(){
welcome.style.display="none";
mood.style.display="block";
}

function goReason(){
mood.style.display="none";
reason.style.display="block";
}

function goBooking(){
reason.style.display="none";
booking.style.display="block";
}

function goScratch(){
reason.style.display="none";
result.innerHTML="🎁 Scratch Card Feature Opened";
}

// SERVICE SELECT
function selectService(s){
service=s;
}

// BENEFITS
function showBenefits(){

booking.style.display="none";
benefits.style.display="block";

let html="";

if(service=="Talk"){
html=`
<h2>🗣️ TALK SERVICE BENEFITS</h2>
<div class="section">💖 Emotional Support</div>
<div class="section">😊 Mood Boosting Conversation</div>
<div class="section">🤝 You Are Not Alone</div>
<div class="section">💬 Deep Listening</div>
`;
}

if(service=="Coffee"){
html=`
<h2>☕ COFFEE DATE BENEFITS</h2>
<div class="section">☕ Relax Time</div>
<div class="section">😊 Friendly Talk</div>
<div class="section">🌸 Peaceful Vibes</div>
`;
}

if(service=="Movie"){
html=`
<h2>🎬 MOVIE TIME BENEFITS</h2>
<div class="section">🎥 Watch Together</div>
<div class="section">🍿 Fun Experience</div>
<div class="section">💖 Enjoyment</div>
`;
}

html+=`
<button onclick="goAppointment()">Continue</button>
<button onclick="back('booking','benefits')">⬅ Back</button>
`;

benefits.innerHTML=html;
}

// APPOINTMENT
function goAppointment(){
benefits.style.display="none";
appointment.style.display="block";
}

// PAYMENT
function goPayment(){
appointment.style.display="none";
payment.style.display="block";
}

function payNow(){

let d=date.value;
let t=time.value;

payment.style.display="none";

result.innerHTML=
"✅ Booking Confirmed<br>" +
"Service: "+service+"<br>" +
"Date: "+d+"<br>" +
"Time: "+t+"<br>" +
"💳 Payment Success (Demo)";
}

// BACK SYSTEM
function back(show,hide){
document.getElementById(hide).style.display="none";
document.getElementById(show).style.display="block";
}

</script>

</body>
</html>
