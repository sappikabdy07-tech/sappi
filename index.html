<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharma Premium Portal</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.box{
width:100%;
max-width:650px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
text-align:center;
}

h1,h2,p{color:white}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4f81;
color:white;
cursor:pointer;
margin:5px;
}

.option{
background:white;
margin:8px;
padding:10px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.option:hover{transform:scale(1.03)}

.card-detail{
color:white;
text-align:left;
padding:10px;
}

.title{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.section{
background:rgba(255,255,255,0.15);
padding:10px;
margin:8px 0;
border-radius:12px;
backdrop-filter:blur(10px);
}

.quote{
text-align:center;
font-style:italic;
margin-top:10px;
opacity:0.9;
}

.helpline{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="box">

<h1>🌸 Premium Portal</h1>

<div class="option" onclick="showCard('normal')">🌸 Normal Card</div>
<div class="option" onclick="showCard('premium')">💎 Premium Card</div>
<div class="option" onclick="showCard('plus')">👑 Premium+ Card</div>

<!-- CARD AREA -->
<div id="cardDetails" class="hidden"></div>

</div>

<script>

let cardDetails = document.getElementById("cardDetails");

// MAIN FUNCTION
function showCard(type){

cardDetails.classList.remove("hidden");

let html="";

// 🌸 NORMAL CARD
if(type=="normal"){
html=`
<div class="card-detail">

<div class="title">🌸 NORMAL CARD BENEFITS</div>

<div class="section">💖 Understanding Your Feelings</div>
<div class="section">😊 Helping Improve Your Mood</div>
<div class="section">🌟 Motivation & Encouragement</div>
<div class="section">🤝 Making Sure You Don't Feel Alone</div>
<div class="section">💬 Understanding & Meaningful Conversations</div>
<div class="section">🗣️ Fun & Casual Conversations</div>

<hr>

<div class="quote">
"Understanding, motivation, and positive conversations whenever you need them." ✨
</div>

<div class="helpline">📞 Helpline: 9015398473</div>

</div>
`;
}

// 💎 PREMIUM CARD
if(type=="premium"){
html=`
<div class="card-detail">

<div class="title">💎 PREMIUM CARD BENEFITS</div>

<div class="section">📞 Voice & Video Call Support</div>
<div class="section">⏳ Long Voice & Video Calls</div>
<div class="section">💖 Deep Listening Without Judgment</div>
<div class="section">🌸 Calm Emotional Support</div>
<div class="section">🤗 Always There For Comfort</div>
<div class="section">😊 Positive Conversations & Mood Boost</div>
<div class="section">🎵 Music & Feel-Good Sharing</div>
<div class="section">💌 Thoughtful & Caring Messages</div>
<div class="section">🌟 Motivation & Emotional Encouragement</div>
<div class="section">❤️ Priority Attention</div>
<div class="section">🌷 Gentle Care & Support</div>
<div class="section">✨ Respect & Emotional Stability</div>

<hr>

<div class="quote">
"More time, more care, and more understanding whenever you need it." 💖
</div>

<div class="helpline">📞 Helpline: 9015398473</div>

</div>
`;
}

// 👑 PREMIUM+
if(type=="plus"){
html=`
<div class="card-detail">

<div class="title">👑 PREMIUM+ CARD BENEFITS</div>

<div class="section">📍 Exclusive Personal Meet-Up Experience</div>
<div class="section">🤝 One-to-One Comfortable Time</div>
<div class="section">🌸 Real Connection & Understanding</div>
<div class="section">😊 Positive Company & Good Vibes</div>
<div class="section">🌟 Emotional Support in Person</div>
<div class="section">❤️ Respectful Interaction</div>
<div class="section">✨ Private & Quality Time</div>

<div class="section">💬 Deep Meaningful Conversations</div>
<div class="section">🌙 Relaxed Stress-Free Experience</div>
<div class="section">🛡️ Safe & Comfortable Environment</div>
<div class="section">🎯 Full Attention & Priority Care</div>
<div class="section">💖 Emotional Stability & Comfort</div>

<hr>

<div class="quote">
"A premium real-life experience built on comfort, respect, and genuine connection." ✨
</div>

<div class="helpline">📞 Helpline: 9015398473</div>

</div>
`;
}

// CLOSE BUTTON
html+=`
<br>
<button onclick="back()">⬅ Back</button>
`;

cardDetails.innerHTML=html;
}

// BACK FUNCTION
function back(){
cardDetails.classList.add("hidden");
}

</script>

</body>
</html>
